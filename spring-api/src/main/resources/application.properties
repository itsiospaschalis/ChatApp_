spring.application.name=spring-api

logging.level.app.chat.springapi=DEBUG
logging.level.org.springframework.security=DEBUG
spring.datasource.url=jdbc:postgresql://localhost:5434/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.show-sql=true

# Groq API key - read from LLMS_GROQ_KEY env var (never commit your real key)
# Set before running: $env:LLMS_GROQ_KEY="gsk_..."  (PowerShell) or export LLMS_GROQ_KEY="gsk_..." (bash)
llms.groq.key=${LLMS_GROQ_KEY}